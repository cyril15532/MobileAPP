<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#0f766e" rx="40"/>
  
  <!-- School building silhouette -->
  <g transform="translate(96, 96)">
    <!-- Main building -->
    <rect x="-45" y="-20" width="90" height="70" fill="white" opacity="0.95"/>
    
    <!-- Roof (triangle) -->
    <polygon points="0,-40 -50,-20 50,-20" fill="white" opacity="0.95"/>
    
    <!-- Flag pole -->
    <rect x="35" y="-55" width="3" height="20" fill="white" opacity="0.8"/>
    
    <!-- Flag -->
    <rect x="38" y="-52" width="15" height="10" fill="#0ea5e9" rx="2"/>
    
    <!-- Window groups (4 rows of 3) -->
    <g fill="white" opacity="0.6">
      <!-- Row 1 -->
      <rect x="-35" y="-12" width="8" height="8" rx="1"/>
      <rect x="-18" y="-12" width="8" height="8" rx="1"/>
      <rect x="-1" y="-12" width="8" height="8" rx="1"/>
      <rect x="16" y="-12" width="8" height="8" rx="1"/>
      
      <!-- Row 2 -->
      <rect x="-35" y="2" width="8" height="8" rx="1"/>
      <rect x="-18" y="2" width="8" height="8" rx="1"/>
      <rect x="-1" y="2" width="8" height="8" rx="1"/>
      <rect x="16" y="2" width="8" height="8" rx="1"/>
      
      <!-- Row 3 -->
      <rect x="-35" y="16" width="8" height="8" rx="1"/>
      <rect x="-18" y="16" width="8" height="8" rx="1"/>
      <rect x="-1" y="16" width="8" height="8" rx="1"/>
      <rect x="16" y="16" width="8" height="8" rx="1"/>
      
      <!-- Row 4 -->
      <rect x="-35" y="30" width="8" height="8" rx="1"/>
      <rect x="-18" y="30" width="8" height="8" rx="1"/>
      <rect x="-1" y="30" width="8" height="8" rx="1"/>
      <rect x="16" y="30" width="8" height="8" rx="1"/>
    </g>
    
    <!-- Door -->
    <rect x="-8" y="35" width="16" height="25" fill="white" opacity="0.7" rx="2"/>
    <circle cx="-2" cy="48" r="2" fill="#0f766e" opacity="0.5"/>
  </g>
</svg>
